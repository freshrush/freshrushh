<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #faf8ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(251, 120, 0, 0.05) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center p-6 bg-mesh">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Branding Header -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-container rounded-xl shadow-lg shadow-primary-container/20 mb-6">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="shopping_basket">shopping_basket</span>
</div>
<h1 class="font-headline font-black italic text-4xl text-primary tracking-tight mb-3">FreshRush</h1>
<p class="font-headline text-on-surface-variant font-semibold text-lg">Welcome back to FreshRush!</p>
</header>
<!-- Login Form Canvas -->
<section class="w-full bg-surface-container-lowest rounded-xl p-8 shadow-[0_24px_48px_rgba(19,27,46,0.06)]">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-DEFAULT shadow-lg shadow-primary-container/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest font-bold">
<span class="bg-surface-container-lowest px-4 text-outline">Or login with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant font-semibold rounded-DEFAULT transition-all active:scale-95">
<img alt="Google" class="w-5 h-5" data-alt="clean vector logo of google with its signature four colors on a white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9RJuVmqxq-sbl42g0v2OJUVAi7mhtl1-mzrY9iFN4bu48asg1bm1FWu9IXt6bNDHqKQJJHAjWZBemPuML6PsZ2kajDN3QsZy7ODRCeHCZOYvxk34azdxYoOXmALu_Yw0e1IqKR6bOvV75vjZKmNWYGo3XxaXdYtlcFWCTblmfpUxhpeZxS8ahu9ejS9qzK7KFVnwSia0UEaFe1cN4Hay98MxXop2krmnFOMOTD4-3cJmlGUJh59GYEJAbeBOM3kG_aNdTqZ1FQpc"/>
<span class="font-label">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant font-semibold rounded-DEFAULT transition-all active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label">Apple</span>
</button>
</div>
</section>
<!-- Footer Navigation -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant font-label">
                New to FreshRush? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</footer>
</main>
<!-- Decorative Elements (Asymmetric Organic Shapes) -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary-container/10 rounded-full blur-[80px] -z-10"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary-container/5 rounded-full blur-[80px] -z-10"></div>
<!-- Visual Polish Backdrop Image -->
<div class="hidden lg:block fixed left-12 top-1/2 -translate-y-1/2 w-[300px] h-[500px] bg-surface-container-low rounded-xl overflow-hidden -z-20 opacity-40 rotate-[-4deg]">
<img class="w-full h-full object-cover" data-alt="vibrant overhead shot of fresh organic bell peppers and greens in a wooden delivery crate with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq9Fp-sLE3eQKDj5a1J0_aAapmAm_uKwS0cgFAayC2B1BFRrEAt-7HZUEk05QACUm5XW58tZuWVe1eOIZdbftPBwFgp7tQkkfoOShGTcBRQdAOIhd7R-mI04DsIWtrtYnMDjnFF81rORSoRIz9O8R73Gy5MidFpOAjucw5t5hujuZh7tKdSnB_xPzrkSmxzM3X6DO8dnQ1stXEZCwjJ3kjPxkJzJyeKAmHrL5ov1fIIINzD734StCaH3RB5grhQvEY-ngHK5JB674"/>
</div>
<div class="hidden lg:block fixed right-12 top-1/2 -translate-y-1/2 w-[280px] h-[450px] bg-surface-container-low rounded-xl overflow-hidden -z-20 opacity-40 rotate-[6deg]">
<img class="w-full h-full object-cover" data-alt="close up of fresh organic vegetables and fruits in a modern kitchen setting with clean editorial aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSp2qj0X8MQ5zu7hheHZy8z8vuIiBn0nfemDWgkguSzdXwXAqCzxvOsjfMwQL9NgExiPod2RPZkh-W28XXyUrv06NbcUoFSz5FjK0OHrQyE4V6GGxb_0r46XAnhLXMzmP83--oW5gvKpbm4BrKzU2G5P4gacZXELb5UbbG3zx5cTBY8imBDtmjo_W8fDZTR2TYXmCP6pslF-kxbov1Y3DCb4IUqa_nGzgLZhruIsF6rEtQ0LDd1OOBelaUD4sMjcBkjygFxRauVSs"/>
</div>
