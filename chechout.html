<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - FreshRush</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-background selection:bg-primary-container/30">
<!-- Top Navigation Bar (Checkout Context - Navigation Shell Suppressed per Rule) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-lg mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface active:scale-95 transition-transform" onclick="window.location.href='{{DATA:SCREEN:SCREEN_8}}'">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-headline font-extrabold tracking-tight text-on-surface">Checkout</h1>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 bg-secondary-container/10 rounded-full">
<span class="material-symbols-outlined text-secondary-container text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-xs font-bold text-secondary-container uppercase tracking-wider">Express</span>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto space-y-8">
<!-- Delivery Mode Toggle -->
<section class="bg-surface-container-low p-1.5 rounded-xl flex gap-1">
<button class="flex-1 py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 bg-surface-container-lowest text-primary shadow-sm">
                Delivery
            </button>
<button class="flex-1 py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 text-on-surface-variant hover:bg-surface-container-high">
                Self Pickup
            </button>
</section>
<!-- Address / Pickup Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-lg font-headline font-bold text-on-surface">Delivery Address</h2>
<button class="text-primary text-sm font-semibold hover:text-primary-container active:scale-95 transition-all cursor-pointer">Change</button>
</div>
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<p class="font-bold text-on-surface">Home</p>
<p class="text-sm text-on-surface-variant leading-relaxed mt-1">452 Orchard Street, West Green Valley, Building 4C, Apartment 12</p>
</div>
</div>
<!-- Visual Map Placeholder -->
<div class="relative h-32 rounded-lg overflow-hidden grayscale-[0.5] opacity-80 border border-outline-variant/20">
<img alt="Simplified minimalist street map showing the delivery route and destination marker in a clean green and grey palette" class="w-full h-full object-cover" data-location="Seattle" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvB6q1e5x8dPUEPwMHpJ93tkO4cDyhsg8CnEaWBDbuQyiNeS1uvbI4CgjkZmirVp9ScYOMEXSO030XBqnjTLalEN9M3x3jSvRLIHdSOZ7AV1CxdnC9ASDz4-W-X9J9NtGCdyyV5DgJNkN0A5Ui1xnI3VWQTLdKavPdXvZmCaCBRoBUPlePrPxtd_58oZM5NixhNCmb5dZyxLhcDsRjlNL6V7bcVcchaNXxRNp1h9_VkyECv_akx8LGumAAkhefLfCTnEfGsdj6plw"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/40 to-transparent"></div>
</div>
</section>
<!-- Payment Options -->
<section class="space-y-4">
<h2 class="text-lg font-headline font-bold text-on-surface">Choose Payment Method</h2>
<div class="space-y-3">
<!-- UPI Option -->
<label class="group relative flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg cursor-pointer border-2 border-transparent transition-all hover:bg-surface-container-low has-[:checked]:border-primary-container/30 has-[:checked]:bg-primary-container/5">
<input checked="" class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">account_balance_wallet</span>
</div>
<div>
<p class="font-bold text-on-surface">UPI / Online Payment</p>
<p class="text-xs text-on-surface-variant">Google Pay, PhonePe, Cards</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary-container peer-checked:bg-primary-container flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 rounded-full bg-white scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
</label>
<!-- Cash Option -->
<label class="group relative flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg cursor-pointer border-2 border-transparent transition-all hover:bg-surface-container-low has-[:checked]:border-primary-container/30 has-[:checked]:bg-primary-container/5">
<input class="hidden peer" name="payment" type="radio"/>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">payments</span>
</div>
<div>
<p class="font-bold text-on-surface">Cash on Delivery</p>
<p class="text-xs text-on-surface-variant">Pay at your doorstep</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary-container peer-checked:bg-primary-container flex items-center justify-center transition-all">
<div class="w-2.5 h-2.5 rounded-full bg-white scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
</label>
</div>
</section>
<!-- Order Summary -->
<section class="space-y-4">
<h2 class="text-lg font-headline font-bold text-on-surface">Order Summary</h2>
<div class="bg-surface-container-lowest p-6 rounded-lg space-y-4 shadow-sm">
<!-- Item List -->
<div class="flex items-center justify-between text-sm">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-md bg-surface-container-low flex items-center justify-center font-bold text-primary">2x</div>
<span class="text-on-surface">Organic Hass Avocado</span>
</div>
<span class="font-bold text-on-surface">$8.40</span>
</div>
<div class="flex items-center justify-between text-sm">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-md bg-surface-container-low flex items-center justify-center font-bold text-primary">1x</div>
<span class="text-on-surface">Fresh Greek Yogurt</span>
</div>
<span class="font-bold text-on-surface">$5.20</span>
</div>
<div class="h-px bg-surface-container-low w-full my-2"></div>
<!-- Price Details -->
<div class="space-y-2">
<div class="flex justify-between text-sm text-on-surface-variant">
<span>Subtotal</span>
<span>$13.60</span>
</div>
<div class="flex justify-between text-sm text-on-surface-variant">
<span>Delivery Fee</span>
<span class="text-primary font-bold">FREE</span>
</div>
<div class="flex justify-between text-lg font-headline font-extrabold text-on-surface pt-2">
<span>Total</span>
<span>$13.60</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-xl px-6 pb-10 pt-4 rounded-t-xl shadow-[0_-8px_32px_rgba(0,0,0,0.06)] z-50">
<div class="max-w-lg mx-auto">
<button class="w-full py-5 rounded-DEFAULT bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-lg shadow-primary-container/20" onclick="window.location.href='{{DATA:SCREEN:SCREEN_7}}'">
<span>Place Order</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-[10px] text-on-surface-variant mt-4 uppercase tracking-[0.2em] font-bold">Secure Encrypted Payment</p>
</div>
</footer>
</body></html>
